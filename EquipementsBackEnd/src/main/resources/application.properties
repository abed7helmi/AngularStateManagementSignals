spring.application.name=EquipementsBackEnd

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/equipements_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080

# Logging
logging.level.com.store.equipementsbackend=DEBUG

# JWT
jwt.secret=itStockManagerJwtSecretKey2024@ProductionUseLongAndSecureKeyHereV1!
jwt.expiration=86400000
